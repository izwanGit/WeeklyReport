<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      width: 280px;
      background: #f8fafc;
      color: #1e293b;
    }

    .header {
      background: #00B1A9;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: white;
      opacity: 0.85;
    }

    .header h1 {
      color: white;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .header p {
      color: rgba(255,255,255,0.8);
      font-size: 10px;
      margin-top: 1px;
    }

    .body {
      padding: 16px 18px;
    }

    .status-box {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #64748b;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #cbd5e1;
    }
    .status-dot.green  { background: #22c55e; }
    .status-dot.yellow { background: #f59e0b; }
    .status-dot.red    { background: #ef4444; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: #00B1A9;
      color: white;
    }
    .btn:hover   { background: #008C86; transform: translateY(-1px); }
    .btn:active  { transform: translateY(0); }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

    .footer {
      padding: 10px 18px 14px;
      font-size: 10px;
      color: #94a3b8;
      text-align: center;
      border-top: 1px solid #f1f5f9;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="header-dot"></div>
    </div>
    <div>
      <h1>MyGenie Cookie Bridge</h1>
      <p>PETRONAS Weekly Report</p>
    </div>
  </div>

  <div class="body">
    <div class="status-box">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Ready to send cookies…</span>
    </div>

    <button class="btn" id="sendBtn">
      🔗 Send Session to Report App
    </button>
  </div>

  <div class="footer">
    Only sends cookies to localhost. Nothing leaves your machine.
  </div>

  <script src="popup.js"></script>
</body>
</html>
